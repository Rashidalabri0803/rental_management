{% extends 'base.html' %}

{% block title %} تأكيد الحذف {% endblock %}

{% block content %}
<h1> تأكيد الحذف </h1>
<p> هل أنت متأكد أنك تريد حذف "{{ object }}"؟ </p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> حذف ،نعم</button>
    <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary"><i class="fas fa-times"></i> إلغاء</a>
</form>
{% endblock %}
