{% extends 'rental/base.html' %}

{% block title %}المباني{% endblock %}

{% block content %}
  <h1 class="mb-4">المباني</h1>
  <a href="{% url 'rental:add_building' %}" class="btn btn-primary mb-3"><i class="fas fa-building"></i>إضافة مبني جديد</a>
  <table class="table table-bordered table-striped">
    <thead>
      <tr class="table-dark">
        <th>اسم المبني</th>
        <th>الموقع</th>
        <th>عدد الوحدات</th>
        <th>الإجراءات</th>
      </tr>
    </thead>
    <tbody>
      {% for building in buildings %}
        <tr>
          <td>{{ building.name }}</td>
          <td>{{ building.location }}</td>
          <td>{{ building.total_units }}</td>
          <td>
            <a href="{% url 'rental:edit_building' building.pk %}" class="btn btn-warning"><i class="fas fa-edit"></i>تعديل</a>
            <a href="{% url 'rental:delete_building' building.pk %}" class="btn btn-danger"><i class="fas fa-trash"></i>حذف</a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
