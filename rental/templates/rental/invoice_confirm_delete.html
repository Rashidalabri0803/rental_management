{% extends 'rental/base.html' %}
{% block title %}تأكيد الحذف{% endblock %}
{% block content %}
<h1>تأكيد حذف فاتورة</h1>
<p>هل أنت متأكد من أنك تريد هذه الفاتورة؟</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">نعم ، حذف</button>
    <a href="{% url 'rental:invoice_list' %}" class="btn btn-secondary">إلغاء</a>
</form>
{% endblock %}
