{% extends 'rental/base.html' %}

{% block title %}تفاصيل الوحدة{% endblock %}

{% block content %}
<h1>تفاصيل الوحدة</h1>
<p><strong>رقم الوحدة:</strong> {{ unit_number }}</p>
<p><strong>النوع:</strong> {{ unit.get_unit_type_display }}</p>
<p><strong>الحالة:</strong> {{ unit.get_status_display }}</p>
<p><strong>الوصف:</strong> {{ unit.description }}</p>
<a href="{% url 'unit_list' %}" class="btn btn-secondary">رجوع</a>
{% endblock %}
