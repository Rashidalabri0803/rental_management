{% extends 'rental/base.html' %}

{% block title %}حذف وحدة{% endblock %}

{% block content %}
<h1>حذف وحدة</h1>
<p>هل أنت متأكد من أنك تريد حذف الوحدة "{{ object.unit_number }}"؟</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">نعم ، حذف</button>
    <a href="{% url 'rental:unit_list' %}" class="btn btn-secondary">إلغاء</a>
</form>
{% endblock %}
