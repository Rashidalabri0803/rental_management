{% extends 'rental/base.html' %}

{% block title %}
  إضافة/تعديل مستأجر
{% endblock %}

{% block content %}
  <h1>إضافة/تعديل مستأجر</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i>حفظ</button>
    <a href="{% url 'rental:tenant_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i>إلغاء</a>
  </form>
{% endblock %}
