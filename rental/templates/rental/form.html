{% extends 'base.html' %}

{% block title %}إضافة/تعديل بيانات{% endblock %}

{% block content %}
<h1>إضافة/تعديل بيانات</h1>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> حفظ</button>
  <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary"><i class="fas fa-times"></i> إلغاء</a>
</form>
{% endblock %}
