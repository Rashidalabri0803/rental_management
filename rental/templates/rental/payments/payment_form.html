{% extends 'rental/base.html' %}
{% block title %}إضافة دفعة{% endblock %}
{% block content %}
<h1>إضافة دفعة</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i>حفظ</button>
    <a href="{% url 'rental:payment_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i>إلغاء</a>
</form>
{% endblock %}
